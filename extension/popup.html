<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Browser Bridge</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>Browser Bridge</h1>

      <label>
        Bridge Server WS URL
        <input id="wsUrl" placeholder="wss://bridge.example.com/ws/client" />
      </label>

      <label>
        Instance ID
        <input id="instanceId" placeholder="instance-1" />
      </label>

      <label>
        Client ID
        <input id="clientId" placeholder="chrome-main" />
      </label>

      <label>
        Auth Token / JWT
        <input id="authToken" placeholder="token or jwt" />
      </label>

      <div class="buttons">
        <button id="saveBtn">Save</button>
        <button id="connectBtn">Connect</button>
        <button id="disconnectBtn">Disconnect</button>
      </div>

      <p id="status" class="status">Status: idle</p>
    </main>
    <script src="popup.js" type="module"></script>
  </body>
</html>
