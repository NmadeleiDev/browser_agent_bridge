<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Browser Bridge connected tab preview</title>
  <desc id="desc">Stylized preview showing Browser Bridge connection status and active tab metadata.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="120" y="80" width="1040" height="560" rx="18" fill="url(#panel)" stroke="#334155" stroke-width="2"/>
  <rect x="120" y="80" width="1040" height="58" rx="18" fill="#0b1220"/>
  <circle cx="156" cy="109" r="8" fill="#ef4444"/>
  <circle cx="184" cy="109" r="8" fill="#f59e0b"/>
  <circle cx="212" cy="109" r="8" fill="#22c55e"/>
  <rect x="250" y="92" width="650" height="34" rx="8" fill="#111827" stroke="#334155"/>
  <text x="270" y="114" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" fill="#93c5fd">
    ws://127.0.0.1:8765/ws/client
  </text>
  <text x="160" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="26" fill="#f8fafc">
    Browser Bridge
  </text>
  <text x="160" y="240" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#cbd5e1">
    Status: connected
  </text>
  <circle cx="320" cy="234" r="7" fill="#22c55e"/>
  <text x="160" y="285" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#cbd5e1">
    Instance ID: local-instance
  </text>
  <text x="160" y="320" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#cbd5e1">
    Client ID: chrome-main
  </text>
  <text x="160" y="370" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#93c5fd">
    Active tab: https://example.com
  </text>
  <rect x="160" y="410" width="760" height="172" rx="10" fill="#0b1220" stroke="#334155"/>
  <text x="186" y="447" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" fill="#e2e8f0">
    { "kind": "observe", "url": "https://example.com", "title": "Example Domain" }
  </text>
  <text x="186" y="482" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" fill="#a5b4fc">
    { "kind": "result", "ok": true, "request_id": "demo-1" }
  </text>
</svg>
